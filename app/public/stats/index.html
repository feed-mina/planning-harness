<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>통계 — 회의록 메이커</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="stats">
  <div class="wrap">
    <div class="card">
      <h1>사용량 통계</h1>
      <p class="lead">provider별·일자별 토큰 사용량과 비용(원). <span class="usage-pill" data-usage>…</span></p>

      <div class="grid2">
        <div class="panel"><div class="field-label">오늘 사용 비용</div><div class="stat-num" id="todayCost">–</div></div>
        <div class="panel"><div class="field-label">오늘 남은 한도</div><div class="stat-num" id="remain">–</div></div>
      </div>

      <div class="panel">
        <div class="field-label">최근 14일 일자별 비용(원)</div>
        <canvas id="dailyChart" height="140"></canvas>
        <p class="hint" id="dailyEmpty" hidden>아직 사용 기록이 없습니다.</p>
      </div>

      <div class="panel">
        <div class="field-label">provider별 비용 비중</div>
        <div style="max-width:320px;margin:0 auto"><canvas id="providerChart" height="220"></canvas></div>
        <p class="hint" id="provEmpty" hidden>아직 사용 기록이 없습니다.</p>
      </div>

      <p class="foot"><a href="https://github.com/feed-mina/planning-harness/issues/3">Epic #3</a></p>
    </div>
  </div>
  <script src="/assets/common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="/assets/stats.js"></script>
</body>
</html>
