<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>통계 — 회의록 메이커</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="stats">
  <div class="wrap">
    <div class="card">
      <h1>사용량 통계</h1>
      <p class="lead">provider별·일자별 토큰 사용량과 비용(원)을 봅니다. <span class="usage-pill" data-usage>…</span></p>

      <div class="grid2">
        <div class="panel"><div class="field-label">오늘 사용 비용</div><div class="stat-num" id="todayCost">–</div><p class="hint">일 한도 대비.</p></div>
        <div class="panel"><div class="field-label">오늘 남은 한도</div><div class="stat-num" id="remain">–</div></div>
      </div>

      <div class="panel">
        <div class="field-label">일자별 토큰/비용 차트 <span class="badge-soon">M4 · 경량 라이브러리</span></div>
        <p class="hint">D1 <code>usage_events</code> 집계 → 경량 차트로 렌더 예정. 지금은 오늘 합계만 표시합니다.</p>
      </div>
      <p class="foot"><a href="https://github.com/feed-mina/planning-harness/issues/3">Epic #3</a></p>
    </div>
  </div>
  <script src="/assets/common.js"></script>
  <script>
    fetch("/api/usage").then(r => r.json()).then(d => {
      document.getElementById("todayCost").textContent = Math.round(d.used_krw) + "원";
      document.getElementById("remain").textContent = Math.round(d.remaining_krw) + "원";
    }).catch(() => {});
  </script>
</body>
</html>
