name: Harness Bot (@claude)

# 이슈·PR 코멘트에 @claude 를 붙이면 하네스 스킬을 실행합니다.
# 예시:
#   @claude /search-documents kiba_2026 원가계산서
#   @claude /split-requirements "회의록 → GitHub 이슈 자동 동기화"
#   @claude /git-project-sync 2026-07-01
#
# 모든 변경사항은 PR 로 제출됩니다 (main 직접 커밋 금지).
# 가드레일: CLAUDE.md 의 승인 게이트 규칙이 자동 적용됩니다.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  harness-bot:
    # @claude 키워드가 있는 코멘트만 처리
    if: |
      contains(github.event.comment.body, '@claude') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Harness
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # trigger_phrase 기본값은 @claude 이므로 별도 설정 불필요
          # CLAUDE.md 가 루트에 있어 하네스 규칙(가드레일·7개 스킬)이 자동 적용됩니다.
          # 모든 산출물은 outputs/<오늘날짜>/ 에 저장되고, 변경은 PR 로 제출됩니다.
