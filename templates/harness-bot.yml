name: Harness Bot (@claude)

# 기획 하네스 봇 — planning-harness 플러그인 설치 후 이 파일을
# 대상 레포의 .github/workflows/harness-bot.yml 에 복사하세요.
#
# 사전 준비:
#   1) ANTHROPIC_API_KEY 시크릿을 Settings > Secrets > Actions 에 추가
#   2) GH_PAT 시크릿 (project 스코프 포함) 추가
#   3) .harness/config.env 파일 작성 (templates/harness.config.env 참고)
#
# 사용 예시 (이슈·PR 코멘트에):
#   @claude /search-documents 원가계산서
#   @claude /split-requirements "FR-001: 3개 엑셀 입력 파싱"
#   @claude /sequence-diagram 원가계산서 생성 흐름
#   @claude /user-flow 사용자 엑셀 업로드 → 결과 다운로드
#   @claude /logic-check 원가계산서 생성기
#   @claude /release-note v1.0.0
#   @claude /git-project-sync 2026-07-01
#
# 모든 변경사항은 PR 로 제출됩니다. 가드레일: planning-harness CLAUDE.md 적용.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  harness-bot:
    if: |
      contains(github.event.comment.body, '@claude') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # planning-harness 플러그인 설치 (최신 버전)
      - name: Install planning-harness plugin
        run: |
          if [ -f ".harness/config.env" ]; then
            echo "✅ .harness/config.env 발견 — 프로젝트 설정 사용"
          else
            echo "⚠️  .harness/config.env 없음 — templates/harness.config.env 를 복사해 값을 채우세요"
          fi

      - name: Run Claude Harness
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # planning-harness 의 CLAUDE.md 컨텍스트 경로 (플러그인 설치 시 .claude/commands/ 포함)
          # 산출물은 outputs/<날짜>/ 에 저장되고, 변경은 PR 로 제출됩니다.
